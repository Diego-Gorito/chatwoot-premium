tags:
  - Kanban Boards
operationId: updateKanbanBoardInboxes
summary: Update board inboxes
description: Update the list of inboxes associated with a Kanban board
security:
  - userApiKey: []
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        properties:
          inbox_ids:
            type: array
            description: List of inbox IDs to associate with the board
            items:
              type: integer
responses:
  '200':
    description: Inboxes updated successfully
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/kanban_board'
  '401':
    description: Unauthorized
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
  '404':
    description: Board not found
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
