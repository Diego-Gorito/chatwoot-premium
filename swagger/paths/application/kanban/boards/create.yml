tags:
  - Kanban Boards
operationId: createKanbanBoard
summary: Create a Kanban board
description: Create a new Kanban board in the account
security:
  - userApiKey: []
parameters:
  - $ref: '#/components/parameters/account_id'
requestBody:
  required: true
  content:
    application/json:
      schema:
        $ref: '#/components/schemas/kanban_board_create_update_payload'
responses:
  '201':
    description: Board created successfully
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/kanban_board'
  '401':
    description: Unauthorized
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
  '422':
    description: Unprocessable Entity
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/request_error'
