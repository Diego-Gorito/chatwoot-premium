operationId: getKanbanAuditEvent
summary: Get an audit event
description: Get details of a specific audit event
security:
  - userApiKey: []
responses:
  '200':
    description: Success
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/kanban_audit_event'
