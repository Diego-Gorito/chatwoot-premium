tags:
  - Kanban Tasks
operationId: listKanbanTasks
summary: List Kanban tasks
description: |
  List Kanban tasks with optional filtering and pagination.
  When `board_step_id` and `page` are provided, returns paginated results.
  Otherwise, returns all matching tasks.
security:
  - userApiKey: []
parameters:
  - name: board_id
    in: query
    description: Filter by board ID
    schema:
      type: integer
  - name: board_step_id
    in: query
    description: Filter by step ID
    schema:
      type: integer
  - name: priority
    in: query
    description: Filter by priority
    schema:
      type: string
      enum:
        - urgent
        - high
        - medium
        - low
  - name: agent_id
    in: query
    description: Filter by assigned agent ID
    schema:
      type: integer
  - name: assigned_agent_ids
    in: query
    description: Filter by multiple assigned agent IDs
    schema:
      type: array
      items:
        type: integer
  - name: inbox_id
    in: query
    description: Filter by inbox ID
    schema:
      type: integer
  - name: page
    in: query
    description: Page number for pagination (requires board_step_id)
    schema:
      type: integer
  - name: per_page
    in: query
    description: Number of items per page (max 100, default 25)
    schema:
      type: integer
  - name: sort
    in: query
    description: Sort field
    schema:
      type: string
      enum:
        - title
        - updated_at
        - created_at
        - priority
        - due_date
  - name: order
    in: query
    description: Sort order
    schema:
      type: string
      enum:
        - asc
        - desc
responses:
  '200':
    description: Success
    content:
      application/json:
        schema:
          type: object
          properties:
            tasks:
              type: array
              description: Array of tasks
              items:
                $ref: '#/components/schemas/kanban_task'
            meta:
              type: object
              description: Pagination metadata (when paginated)
              properties:
                total_count:
                  type: integer
                page:
                  type: integer
                per_page:
                  type: integer
                has_more:
                  type: boolean
  '401':
    description: Unauthorized
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
