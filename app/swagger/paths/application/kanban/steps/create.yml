tags:
  - Kanban Board Steps
operationId: createKanbanBoardStep
summary: Create a board step
description: Create a new step in a Kanban board
security:
  - userApiKey: []
requestBody:
  required: true
  content:
    application/json:
      schema:
        $ref: '#/components/schemas/kanban_step_create_update_payload'
responses:
  '201':
    description: Step created successfully
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/kanban_board_step'
  '401':
    description: Unauthorized
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
  '404':
    description: Board not found
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
  '422':
    description: Unprocessable Entity
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/request_error'
