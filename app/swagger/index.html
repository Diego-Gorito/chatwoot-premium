<!DOCTYPE html>
<html>
  <head>
    <title>Chatwoot fazer.ai API Docs</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://framerusercontent.com/images/qXZmpotHTLpymCfaJlzrYz9ns.png" rel="icon" media="(prefers-color-scheme: light)">
    <link href="https://framerusercontent.com/images/u5KNIONna5h9jZiwBP6pC6R8IA.png" rel="icon" media="(prefers-color-scheme: dark)">
    <link rel="apple-touch-icon" href="https://framerusercontent.com/images/oI6WMZXXuNN3hdbhCAU8oYLpJsU.png">
    <style>
      body {
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <script
      id="api-reference"
      data-url="swagger.json"
      data-configuration='{
        "theme": "purple",
        "layout": "modern",
        "hideDarkModeToggle": false,
        "servers": [
          { "url": "https://app.chatwoot.com", "description": "Chatwoot Cloud" },
          { "url": "http://localhost:3000", "description": "Local Development" },
          { "url": "{customUrl}", "description": "Custom Server", "variables": { "customUrl": { "default": "https://your-instance.com", "description": "Your Chatwoot instance URL" } } }
        ]
      }'
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
  </body>
</html>
